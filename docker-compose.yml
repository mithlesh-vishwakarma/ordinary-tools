version: "3.9"

services:
  backend:
    build: ./backend
    container_name: ytgrab-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - downloads:/app/downloads
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    container_name: ytgrab-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  downloads:
