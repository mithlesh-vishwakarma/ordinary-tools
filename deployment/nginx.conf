server {
    listen 80;
    server_name _; # Replace with your VPS public IP address or domain name

    # Serve the React/Vite frontend static files
    location / {
        root /home/ubuntu/ordinary-tools/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the FastAPI backend running on Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed in the future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Performance and large file download configurations
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        
        # Disable body size limit to allow downloading large videos/media
        client_max_body_size 0;
    }
}
